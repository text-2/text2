<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>text2 </title>
  <link href="https://text2.click" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
    }

    /* Overlay mờ nền */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      z-index: 2147483646;
      display: none;
    }

    /* Popup hiện đại */
    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 90%;
      max-width: 850px;
      height: 80%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 2147483647;
      display: none;
      overflow: hidden;
      transition: all 0.35s ease;
      animation: fadeInUp 0.5s ease forwards;
    }

    @keyframes fadeInUp {
      0% {
        transform: translate(-50%, -60%) scale(0.95);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    /* Iframe fullscreen trong popup */
    #popup iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0 0 20px 20px;
    }

    /* Nút đóng sang xịn */
    #close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 20px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      z-index: 2147483648;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #close-btn:hover {
      background: rgba(255, 80, 80, 0.8);
      box-shadow: 0 0 10px rgba(255, 80, 80, 0.6);
    }
  </style>
</head>
<body>

  <!-- Overlay nền -->
  <div id="overlay"></div>

  <!-- Popup hiện đại -->
  <div id="popup">
    <button id="close-btn" onclick="closePopup()">×</button>
    <iframe src="https://example.com"></iframe> <!-- Thay bằng trang bạn muốn nhúng -->
  </div>

  <script>
    function openPopup() {
      document.getElementById('popup').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }

    // Tự động mở popup khi trang load
    window.onload = function () {
      openPopup();
    };
  </script>

</body>
</html>

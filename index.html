<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text2 Team </title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #popup-iframe-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 2147483647;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #popup-iframe-overlay iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      background: #fff;
    }
    #popup-iframe-close {
      position: fixed;
      top: 16px;
      right: 24px;
      z-index: 2147483648;
      font-size: 2rem;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    #popup-iframe-close:hover {
      background: rgba(0, 0, 0, 0.9);
    }
  </style>
</head>
<body>

  <!-- Popup Overlay -->
  <div id="popup-iframe-overlay">
    <iframe src="https://text2.click"></iframe>
  </div>

  <!-- Script xử lý đóng popup -->
  <script>
    const closeBtn = document.getElementById('popup-iframe-close');
    const popupOverlay = document.getElementById('popup-iframe-overlay');

    closeBtn.onclick = () => {
      popupOverlay.style.display = 'none';
      document.body.style.overflow = '';
    };

    window.addEventListener('keydown', function(e) {
      if (e.key === "Escape") {
        closeBtn.click();
      }
    });

    // Khóa cuộn nền khi popup hiển thị
    document.body.style.overflow = 'hidden';
  </script>

</body>
</html>

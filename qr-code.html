<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator 3D Nhẹ Nhàng</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/p/AF1QipMAH2F9BWWLSU14YABENNfSIUDTinGdHOO3wC-S=s1360-w1360-h1020-rw">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
  <style>
    :root {
      --primary: #406aff;
      --secondary: #00ffb0;
      --background: #181c26;
      --card: #222939;
      --white: #fff;
    }
    * { box-sizing: border-box; font-family: 'Inter', 'Montserrat', sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #181c26 0%, #406aff 100%);
      color: var(--white);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    header {
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      box-shadow: 0 8px 32px 0 #406aff44;
      padding: 1.4rem 0 1rem 0;
      z-index: 2;
    }
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      color: var(--white);
      font-size: 2rem;
      font-weight: 700;
      text-shadow: 0 6px 24px var(--primary), 0 2px 8px var(--secondary);
      letter-spacing: 2px;
      transition: transform 0.2s;
      user-select: none;
    }
    .logo:hover {
      transform: scale(1.04) skewY(-2deg);
    }
    nav {
      display: flex;
      gap: 1.5rem;
      font-size: 1.08rem;
    }
    nav a {
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      position: relative;
      padding: 0.4rem 1.1rem;
      border-radius: 12px;
      transition: background .22s, color .2s;
    }
    nav a:hover {
      background: rgba(255,255,255,0.10);
      color: var(--secondary);
    }
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 0;
    }
    .card-3d {
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 8px 32px 0 #406aff44, 0 2px 8px 0 #00ffb033;
      border: 2px solid var(--primary);
      padding: 50px 38px 38px 38px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 420px;
      width: 100%;
      margin: 0 1rem;
      position: relative;
      /* 3D effect */
      transform: rotateY(-8deg) rotateX(5deg);
      transition: box-shadow .3s, transform .25s;
    }
    .card-3d:hover {
      box-shadow: 0 16px 54px #406aff77, 0 4px 16px #00ffb077;
      transform: rotateY(-12deg) rotateX(7deg) scale(1.02);
    }
    h1 {
      text-align: center;
      font-family: 'Montserrat',sans-serif;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 6px 24px var(--primary), 0 2px 8px var(--secondary);
      margin: 0 0 1.1rem 0;
      letter-spacing: 1.5px;
    }
    label {
      color: var(--secondary);
      font-weight: 700;
      font-size: 1.09rem;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      display: block;
    }
    textarea {
      width: 100%;
      padding: 16px;
      background: #181c26;
      color: var(--white);
      border: 2px solid var(--primary);
      border-radius: 14px;
      margin-top: 4px;
      font-size: 1.05rem;
      box-shadow: 0 2px 6px #00ffb022 inset;
      resize: vertical;
      outline: none;
      transition: border-color .23s, box-shadow .18s;
    }
    textarea:focus {
      border-color: var(--secondary);
      box-shadow: 0 6px 18px var(--secondary), 0 2px 8px var(--primary) inset;
    }
    .pickr {
      margin-top: 7px;
      width: 100%;
      background: transparent;
    }
    .pickr .pcr-button {
      height: 44px;
      width: 100%;
      border-radius: 12px;
      border: 2px solid var(--primary);
      background: #23272a;
      box-shadow: 0 2px 8px var(--secondary) inset;
      transition: border-color .18s, box-shadow .15s;
    }
    .pickr .pcr-button:hover, .pickr .pcr-button:focus {
      border-color: var(--secondary);
      box-shadow: 0 2px 10px var(--secondary) inset;
    }
    .text-center { text-align: center; }
    button {
      margin-top: 12px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      color: #fff;
      font-size: 1.11rem;
      font-weight: bold;
      padding: 14px 0;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 18px var(--primary), 0 1.5px 5px var(--secondary);
      letter-spacing: 1.2px;
      transition: background .18s, box-shadow .2s, transform .12s;
      /* 3d effect */
      transform: rotateX(2deg);
    }
    button:hover {
      background: linear-gradient(90deg, var(--secondary) 0%, var(--primary) 100%);
      transform: scale(1.04) rotateX(4deg) rotateY(-2deg);
      box-shadow: 0 10px 32px var(--secondary), 0 3px 12px var(--primary);
    }
    #qrcode {
      margin-top: 13px;
      display: flex; flex-direction: column; align-items: center;
    }
    /* 3D effect for QR canvas */
    #qrcode canvas {
      border-radius: 14px;
      box-shadow:
        0 8px 32px #00ffb044, 0 2px 8px #406aff66,
        0 0 0 3px #406aff;
      background: #fff;
      width: 300px; height: 300px;
      transform: rotateX(7deg) rotateY(-7deg) scale(1.01);
      transition: transform .18s, box-shadow .14s;
    }
    #qrcode canvas:hover {
      transform: scale(1.06) rotateX(3deg) rotateY(-3deg);
      box-shadow: 0 16px 38px #406aff99, 0 8px 24px #00ffb0cc, 0 0 0 6px #00ffb033;
    }
    #downloadLink {
      display: inline-block;
      background: #23272a;
      border: 2px solid var(--primary);
      color: var(--secondary);
      padding: 12px 32px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      margin-top: 25px;
      font-size: 1.05rem;
      letter-spacing: .07em;
      box-shadow: 0 6px 20px var(--primary), 0 2px 8px var(--secondary);
      transition: all .18s;
      position: relative;
      z-index: 1;
      /* 3d effect */
      transform: rotateX(3deg);
    }
    #downloadLink:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--secondary);
      transform: scale(1.05) rotateX(5deg) rotateY(-2deg);
      box-shadow: 0 12px 30px var(--secondary);
    }
    footer {
      background: linear-gradient(120deg, #23272a 60%, var(--primary) 100%);
      padding: 2rem 0 1.2rem 0;
      border-top: 2px solid var(--primary);
      box-shadow: 0 -4px 24px 0 #406aff22;
      text-align: center;
      font-size: 1rem;
      color: var(--secondary);
      letter-spacing: .03em;
      font-family: 'Montserrat', sans-serif;
    }
    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      color: var(--secondary);
      font-size: 0.98rem;
    }
    /* Responsive */
    @media (max-width: 900px) {
      .card-3d {
        max-width: 95vw;
        padding: 30px 4vw 24px 4vw;
      }
      #qrcode canvas { width: 200px; height: 200px; }
    }
    @media (max-width: 600px) {
      .card-3d { padding: 13px 1vw 16px 1vw; }
      h1 { font-size: 1.08rem; }
      label { font-size: 1rem; }
      #downloadLink { padding: 8px 4vw; font-size: 0.95rem; }
      #qrcode canvas { width: 130px; height: 130px; }
      nav { gap: 0.8rem; font-size: 0.98rem; }
      .logo { font-size: 1.1rem; }
      .footer-content { font-size: 0.93rem; }
    }
    @media (max-width: 420px) {
      .card-3d { padding: 6px 0vw 10px 0vw; }
      h1 { font-size: 0.94rem; }
      nav { gap: 0.3rem; font-size: 0.91rem; }
      .logo { font-size: 0.81rem; }
      #downloadLink { font-size: 0.79rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="/" class="logo">QR Code 3D Nhẹ Nhàng</a>
      <nav>
        <a href="/">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="card-3d">
      <h1>✨ QR Code Generator 3D Nhẹ Nhàng ✨</h1>
      <label for="textInput">Nhập nội dung hoặc liên kết:</label>
      <textarea id="textInput" rows="4" placeholder="Dán nội dung hoặc URL của bạn vào đây..."></textarea>
      <label for="darkColor">Chọn màu mã QR:</label>
      <div id="darkColor"></div>
      <label for="lightColor">Chọn màu nền:</label>
      <div id="lightColor"></div>
      <div class="text-center">
        <button onclick="generateQR()">Tạo QR 3D</button>
      </div>
      <div id="qrcode" class="text-center"></div>
      <div class="text-center">
        <a id="downloadLink" style="display:none;" download="awesome-qr-code.png">⬇️ Tải mã QR của bạn</a>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-content">
      <p>© 2024 QR Code 3D Nhẹ Nhàng. Làm bởi <span style="color:var(--secondary);font-weight:700;">💚</span> Hóa Nhật Anh.</p>
    </div>
  </footer>
  <script>
    // Khởi tạo Pickr cho darkColor và lightColor
    const darkPicker = Pickr.create({
      el: '#darkColor',
      theme: 'classic',
      default: '#406aff',
      swatches: [
        '#406aff', '#00ffb0', '#ff8e53', '#21262b', '#fff', '#e0e4ea'
      ],
      components: {
        preview: true,
        opacity: true,
        hue: true,
        interaction: {
          hex: true,
          rgba: true
        }
      }
    });

    const lightPicker = Pickr.create({
      el: '#lightColor',
      theme: 'classic',
      default: '#181c26',
      swatches: [
        '#181c26', '#f5f5f5', '#ececec', '#fff', '#406aff', '#e0e4ea'
      ],
      components: {
        preview: true,
        opacity: true,
        hue: true,
        interaction: {
          hex: true,
          rgba: true
        }
      }
    });

    function generateQR() {
      const text = document.getElementById("textInput").value.trim();
      const darkColor = darkPicker.getColor().toHEXA().toString();
      const lightColor = lightPicker.getColor().toHEXA().toString();
      const qrContainer = document.getElementById("qrcode");
      const downloadLink = document.getElementById("downloadLink");

      if (!text) {
        alert("Vui lòng nhập nội dung hoặc liên kết để tạo mã QR!");
        return;
      }

      qrContainer.innerHTML = "";
      downloadLink.style.display = "none";

      QRCode.toCanvas(text, {
        width: 300,
        color: {
          dark: darkColor,
          light: lightColor
        }
      }, function (err, canvas) {
        if (err) {
            console.error(err);
            alert("Có lỗi xảy ra khi tạo QR code. Vui lòng thử lại sau.");
            return;
        }

        qrContainer.appendChild(canvas);
        const dataURL = canvas.toDataURL("image/png");
        downloadLink.href = dataURL;
        downloadLink.style.display = "inline-block";
        downloadLink.download = `qr-3d-${Date.now()}.png`;
      });
    }
  </script>
</body>
</html>

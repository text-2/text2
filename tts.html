<html lang="vi">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1e40af;
      --background: #f9fafb;
      --header-bg: #fff;
      --border: #e5e7eb;
      --card-bg: #fff;
      --input-bg: #f3f4f6;
      --input-border: #d1d5db;
      --input-focus: #fff;
      --text-main: #1f2937;
      --text-sub: #6b7280;
      --radius: 12px;
      --shadow: 0 2px 14px 0 rgba(0,0,0,.06);
      --transition: .16s cubic-bezier(.4,0,.2,1);
    }
    html, body {
      background: var(--background);
      color: var(--text-main);
      font-family: 'Inter', Arial, sans-serif;
      font-size: 16px;
      margin: 0;
      padding: 0;
      min-height: 100%;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      width: 100%;
      max-width: 510px;
      margin: 48px auto 0 auto;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 65vh;
    }
    @media (max-width: 650px) {
      .container {
        border-radius: 0;
        margin-top: 0;
        min-height: 100vh;
        border-left: none;
        border-right: none;
      }
    }
    header {
      background: var(--header-bg);
      padding: 32px 30px 8px 30px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .logo-title {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }
    .desc {
      color: var(--text-sub);
      font-size: 1.05rem;
      margin-bottom: 10px;
    }
    main {
      flex: 1 0 auto;
      padding: 36px 30px 10px 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: var(--card-bg);
    }
    @media (max-width: 600px) {
      header, main {
        padding-left: 5vw;
        padding-right: 5vw;
      }
      main { padding-top: 24px; padding-bottom: 4vw;}
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      position: relative;
      width: 100%;
    }
    label {
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 500;
      margin-bottom: 2px;
      letter-spacing: 0.1px;
      display: flex;
      align-items: center;
      gap: 7px;
      user-select: none;
    }
    label .input-icon {
      margin-top: 1px;
      color: var(--primary);
      font-size: 1.1rem;
    }
    textarea, select {
      width: 100%;
      font-size: 1rem;
      padding: 16px 14px 16px 14px;
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      background: var(--input-bg);
      color: var(--text-main);
      outline: none;
      box-shadow: none;
      transition: border-color var(--transition), background var(--transition);
      resize: vertical;
      margin-bottom: 0;
    }
    textarea:focus, select:focus {
      background: var(--input-focus);
      border-color: var(--primary);
    }
    textarea {
      min-height: 120px;
      font-family: inherit;
    }
    .controls {
      display: flex;
      flex-direction: row;
      gap: 16px;
      justify-content: flex-start;
      margin-top: 2px;
      margin-bottom: 0;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 13px 28px;
      cursor: pointer;
      box-shadow: none;
      transition: background var(--transition), transform var(--transition);
      outline: none;
      letter-spacing: 0.1px;
      justify-content: center;
    }
    .btn:active {
      background: var(--primary-hover);
      transform: scale(0.97);
    }
    .btn[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
      background: var(--primary-hover);
    }
    .sound-waves {
      display: flex;
      height: 26px;
      align-items: flex-end;
      gap: 4px;
      justify-content: center;
      margin-top: 7px;
      margin-bottom: 2px;
      min-height: 26px;
      user-select: none;
    }
    .sound-waves span {
      width: 5px;
      border-radius: 2px;
      background: var(--primary);
      display: inline-block;
      animation: waveBounce 1.1s infinite;
      opacity: 0.9;
    }
    .sound-waves span:nth-child(1) { animation-delay: 0s;}
    .sound-waves span:nth-child(2) { animation-delay: 0.15s;}
    .sound-waves span:nth-child(3) { animation-delay: 0.29s;}
    .sound-waves span:nth-child(4) { animation-delay: 0.42s;}
    .sound-waves span:nth-child(5) { animation-delay: 0.54s;}
    @keyframes waveBounce {
      0%, 100% { height: 10px;}
      40% { height: 25px;}
      60% { height: 15px;}
      80% { height: 22px;}
    }
    .shake { animation: shake 0.36s; }
    @keyframes shake {
      0% { transform: translateX(0);}
      20% { transform: translateX(-7px);}
      40% { transform: translateX(7px);}
      60% { transform: translateX(-5px);}
      80% { transform: translateX(5px);}
      100% { transform: translateX(0);}
    }
    footer {
      width: 100%;
      text-align: center;
      padding: 28px 0 18px 0;
      color: var(--text-sub);
      font-size: 1rem;
      background: none;
      opacity: 0.88;
      border-top: 1px solid var(--border);
      user-select: none;
      letter-spacing: 0.1px;
    }
    @media (max-width: 600px) {
      footer { font-size: 0.97rem; padding: 18px 0 13px 0;}
    }
    /* Button icon alignment for OpenAI style */
    .btn i { font-size: 1.09em; margin-right: 3px;}
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-title">
        <i class="fa-solid fa-robot"></i>
        Text2 - TTS
      </div>
      <div class="desc">
        Nền tảng chuyển văn bản thành giọng nói tiếng Việt tự nhiên.<br>
        Miễn phí cho cá nhân & học tập.
      </div>
    </header>
    <main>
      <form id="ttsForm" autocomplete="off">
        <div class="input-group">
          <label for="textInput">
            <span class="input-icon"><i class="fa-solid fa-keyboard"></i></span>
            Nội dung muốn đọc
          </label>
          <textarea id="textInput" placeholder="Ví dụ: Xin chào, tôi là trợ lý AI hiện đại."></textarea>
        </div>
        <div class="input-group">
          <label for="voiceSelect">
            <span class="input-icon"><i class="fa-solid fa-microchip"></i></span>
            Chọn giọng đọc
          </label>
          <select id="voiceSelect">
            <option value="vi-VN-Wavenet-A">🇻🇳 Wavenet-A (Nữ)</option>
            <option value="vi-VN-Wavenet-B">🇻🇳 Wavenet-B (Nam)</option>
            <option value="vi-VN-Standard-A">🇻🇳 Standard-A (Nữ)</option>
            <option value="vi-VN-Standard-B">🇻🇳 Standard-B (Nam)</option>
          </select>
        </div>
        <div class="controls">
          <button type="button" class="btn" id="speakBtn">
            <i class="fa-solid fa-play"></i>Nghe giọng đọc
          </button>
          <button type="button" class="btn" id="downloadBtn">
            <i class="fa-solid fa-download"></i>Tải MP3
          </button>
        </div>
        <div class="sound-waves" id="soundWaves" style="visibility:hidden;">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </form>
    </main>
  </div>
  <footer>
    © 2025 <b>Text2 - TTS</b> | Công nghệ bởi đội ngũ Việt Nam.<br>
    Ứng dụng thử nghiệm cá nhân, API miễn phí cho học tập.
  </footer>
  <script>
    let lastAudioBase64 = "";
    let audioObj = null;
    const speakBtn = document.getElementById("speakBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const soundWaves = document.getElementById("soundWaves");
    const textInput = document.getElementById("textInput");

    async function callTTS(text, voiceName) {
      // Cảnh báo: API key public chỉ dùng demo! Bảo vệ key khi dùng thực tế.
      const apiKey = "AIzaSyDdAvMyZ_ppUNtnsL-eXNH5qU1oKWi2w7s";
      const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          input: { text },
          voice: { languageCode: "vi-VN", name: voiceName },
          audioConfig: { audioEncoding: "MP3" }
        })
      });
      const data = await response.json();
      if (data.audioContent) {
        lastAudioBase64 = data.audioContent;
        return data.audioContent;
      } else {
        throw new Error(data.error?.message || "Không rõ nguyên nhân");
      }
    }

    function playSoundWave(playing) {
      soundWaves.style.visibility = playing ? "visible" : "hidden";
    }

    speakBtn.addEventListener("click", async () => {
      const text = textInput.value.trim();
      const voice = document.getElementById("voiceSelect").value;
      if (!text) {
        textInput.focus();
        textInput.style.borderColor = "#e74c3c";
        textInput.style.background = "#fff3f3";
        setTimeout(()=>{
          textInput.style.borderColor = "";
          textInput.style.background = "";
        },700);
        return;
      }
      speakBtn.disabled = true;
      speakBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang tạo...';
      playSoundWave(true);

      try {
        const audioBase64 = await callTTS(text, voice);
        if (audioObj) { audioObj.pause(); audioObj = null; }
        audioObj = new Audio("data:audio/mp3;base64," + audioBase64);
        audioObj.onended = () => playSoundWave(false);
        audioObj.onerror = () => playSoundWave(false);
        audioObj.play();
      } catch (err) {
        alert("Lỗi: " + err.message);
        playSoundWave(false);
      } finally {
        speakBtn.innerHTML = '<i class="fa-solid fa-play"></i>Nghe giọng đọc';
        speakBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!lastAudioBase64) {
        speakBtn.classList.add("shake");
        setTimeout(()=>speakBtn.classList.remove("shake"), 500);
        alert("Bạn cần tạo giọng đọc trước khi tải!");
        return;
      }
      const link = document.createElement("a");
      link.href = "data:audio/mp3;base64," + lastAudioBase64;
      link.download = "tts-giọng-đọc.mp3";
      link.click();
    });

    speakBtn.addEventListener("animationend", () => {
      speakBtn.classList.remove("shake");
    });

    textInput.addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "Enter") speakBtn.click();
    });

    // Hiệu ứng typing trên placeholder
    const placeholderTexts = [
      "Ví dụ: Xin chào, tôi là trợ lý AI hiện đại.",
      "Bạn có thể nhập tối đa 5000 ký tự.",
      "Ctrl + Enter để nghe nhanh!"
    ];
    let placeIdx = 0, charIdx = 0, isDel = false;
    setInterval(() => {
      let curr = placeholderTexts[placeIdx];
      if (!isDel) {
        charIdx++;
        if (charIdx > curr.length + 6) isDel = true;
      } else {
        charIdx--;
        if (charIdx <= 0) { isDel = false; placeIdx = (placeIdx + 1) % placeholderTexts.length;}
      }
      textInput.setAttribute("placeholder", curr.substring(0, charIdx));
    }, 85);

    if(window.innerWidth > 800) setTimeout(()=>textInput.focus(), 600);
  </script>
</body>
</html>

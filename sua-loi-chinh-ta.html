<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sửa lỗi chính tả - text2 </title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/p/AF1QipMAH2F9BWWLSU14YABENNfSIUDTinGdHOO3wC-S=s1360-w1360-h1020-rw">
<!-- Google tag (gtag.js) - GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ABCDEFG123"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6J85STMJ14');
</script>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }
    .content-animation {
      animation: fadeIn 0.3s ease-out;
    }
    /* Custom CSS for gradient background on body */
    body {
      background: linear-gradient(to bottom right, #1a202c, #2d3748); /* Dark gradient for depth */
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col font-sans">
  <!-- Header - Thêm gradient và shadow siêu ngầu -->
  <header class="bg-gradient-to-r from-purple-800 to-indigo-900 shadow-xl">
    <div class="container mx-auto px-4 py-6">
      <div class="flex justify-between items-center">
        <h1 class="text-3xl font-extrabold text-white tracking-wide">🔧 Sửa lỗi chính tả</h1>
        <nav>
          <ul class="flex space-x-6">
            <li><a href="#" class="text-gray-200 hover:text-cyan-400 transition duration-300 ease-in-out font-medium">Trang chủ</a></li>
            <li><a href="#" class="text-gray-200 hover:text-cyan-400 transition duration-300 ease-in-out font-medium">Giới thiệu</a></li>
            <li><a href="#" class="text-gray-200 hover:text-cyan-400 transition duration-300 ease-in-out font-medium">Liên hệ</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content - Box chính giữa nổi bật -->
  <main class="flex-grow container mx-auto px-4 py-12 flex items-center justify-center">
    <div class="max-w-4xl w-full mx-auto">
      <div class="bg-gray-800 rounded-3xl shadow-2xl p-8 content-animation border border-purple-600 transform hover:scale-105 transition-transform duration-300 ease-in-out">
        <div class="grid gap-8">
          <!-- Textarea đầu vào - Nền tối, viền sáng, focus bắt mắt -->
          <textarea
            class="w-full p-6 border-2 border-indigo-500 rounded-2xl shadow-inner bg-gray-900 text-gray-50 focus:outline-none focus:ring-4 focus:ring-purple-500 resize-none placeholder-gray-400 font-mono text-lg"
            id="inputText"
            placeholder="Dán văn bản cần sửa vào đây..."
            rows="12"
          ></textarea>

          <!-- Nút sửa lỗi - Gradient siêu cool, hiệu ứng hover nhẹ nhàng -->
          <button
            class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-4 px-10 rounded-2xl shadow-lg hover:from-emerald-400 hover:to-teal-500 transition duration-300 ease-in-out w-full transform hover:-translate-y-1"
            id="submitBtn"
          >
            Sửa lỗi chính tả
          </button>

          <!-- Loading indicator - Màu sắc nổi bật hơn -->
          <div class="text-center text-cyan-400 hidden animate-pulse" id="loading">
            <svg class="animate-spin h-7 w-7 text-white mx-auto mb-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8V4a10 10 0 0 0 0 20v-4a8 8 0 0 1-8-8z"></path>
            </svg>
            <span class="text-lg">⏳ Đang xử lý... Một chút thôi nè!</span>
          </div>

          <!-- Kết quả - Header màu bắt mắt, box kết quả viền ấn tượng -->
          <div class="hidden" id="resultContainer">
            <h2 class="text-xl font-bold mb-4 text-emerald-400">✅ Kết quả:</h2>
            <div class="bg-gray-900 p-6 border-2 border-emerald-500 rounded-xl whitespace-pre-wrap shadow-lg text-gray-100 text-lg font-mono">
                <p id="outputText"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer - Nền tối, link đổi màu khi hover -->
  <footer class="bg-gray-900 py-8 mt-12 shadow-inner">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left">
        <div class="text-gray-500 text-sm mb-4 md:mb-0">
          © 2024 Sửa lỗi chính tả. All rights reserved. Made with ❤️ by Nhật Anh.
        </div>
        <div class="flex space-x-6">
          <a href="#" class="text-gray-400 hover:text-purple-400 transition duration-200 ease-in-out text-sm">Điều khoản sử dụng</a>
          <a href="#" class="text-gray-400 hover:text-purple-400 transition duration-200 ease-in-out text-sm">Chính sách bảo mật</a>
          <a href="#" class="text-gray-400 hover:text-purple-400 transition duration-200 ease-in-out text-sm">Liên hệ</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const btn = document.getElementById("submitBtn");
    const input = document.getElementById("inputText");
    const output = document.getElementById("outputText");
    const loading = document.getElementById("loading");
    const resultContainer = document.getElementById("resultContainer");

    // Thay thế API_KEY bằng API key cũ của Nhật Anh như đã yêu cầu
    const API_KEY = "AIzaSyDpJuZRk3Q-0sXrV_oH8qCbQ7Z2PHr36qg"; 

    btn.addEventListener("click", async () => {
      const userText = input.value.trim();
      if (!userText) {
        // Thay alert() bằng modal UI tùy chỉnh
        showCustomAlert("Oops! 😅 Bạn chưa nhập gì hết. Cần dán văn bản vào ô trên để mình sửa lỗi nha!");
        return;
      }

      const fullPrompt = "sửa lỗi chính tả văn bản này, không thêm bớt từ chỉ hiện kết quả: " + userText;

      loading.classList.remove("hidden");
      resultContainer.classList.add("hidden");
      output.textContent = "";

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [
              {
                parts: [{ text: fullPrompt }]
              }
            ]
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error("Lỗi API: " + errorText);
        }

        const data = await response.json();
        const resultText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Không có kết quả hợp lệ. 😥 Có vẻ mình hơi lú rồi, thử lại nha!";

        output.textContent = resultText;
        resultContainer.classList.remove("hidden");

      } catch (error) {
        console.error("❌ Lỗi:", error);
        output.textContent = "Đã xảy ra lỗi khi xử lý văn bản. 😔 Đừng lo, thử lại lần nữa xem sao!";
        resultContainer.classList.remove("hidden");
      } finally {
        loading.classList.add("hidden");
      }
    });

    // Hàm hiển thị modal thông báo tùy chỉnh thay cho alert()
    function showCustomAlert(message) {
      // Tạo phần tử modal
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50';
      modal.innerHTML = `
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-sm w-full text-center border-2 border-purple-500 animate-scale-in">
          <p class="text-white text-lg mb-6">${message}</p>
          <button id="closeAlert" class="bg-purple-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-purple-700 transition duration-200">OK la!</button>
        </div>
      `;

      // Thêm modal vào body
      document.body.appendChild(modal);

      // Thêm animation cho modal
      const style = document.createElement('style');
      style.innerHTML = `
        @keyframes scaleIn {
          from { transform: scale(0.8); opacity: 0; }
          to { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
          animation: scaleIn 0.3s ease-out forwards;
        }
      `;
      document.head.appendChild(style);

      // Xử lý sự kiện đóng modal
      document.getElementById('closeAlert').addEventListener('click', () => {
        modal.remove();
        style.remove(); // Xóa style animation khi modal đóng
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Text2 Editor - Thiết kế mới hiện đại</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/p/AF1QipMAH2F9BWWLSU14YABENNfSIUDTinGdHOO3wC-S=s1360-w1360-h1020-rw">
  <style>
    :root {
      --primary: #007bff;
      --primary-dark: #0056b3;
      --primary-light: #e3f0ff;
      --bg: #f6f8fb;
      --editor-bg: #fff;
      --toolbar-bg: #f5f7fa;
      --border: #e3e6eb;
      --text: #23272f;
      --text-light: #8e99ab;
      --icon: #555;
      --radius: 18px;
      --shadow: 0 2px 16px 0 rgba(0,0,0,0.06);
      --editor-shadow: 0 4px 50px 0 rgba(0,0,0,0.12);
      --toolbar-shadow: 0 2px 10px 0 rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --primary: #61dafb;
      --primary-dark: #147eae;
      --primary-light: #1e1e2f;
      --bg: #14171b;
      --editor-bg: #23272f;
      --toolbar-bg: #181b22;
      --border: #23242a;
      --text: #e7e8ed;
      --text-light: #8891a9;
      --icon: #a9b8d6;
      --shadow: 0 2px 20px 0 rgba(0,0,0,0.29);
      --editor-shadow: 0 6px 60px 0 rgba(0,0,0,0.44);
      --toolbar-shadow: 0 2px 14px 0 rgba(0,0,0,.25);
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      min-height: 100vh;
    }
    .container {
      max-width: 820px;
      margin: 32px auto 0 auto;
      padding: 0 10px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 14px 10px 14px;
      background: var(--toolbar-bg);
      border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: var(--toolbar-shadow);
      position: sticky;
      top: 0;
      z-index: 99;
      overflow: visible;
      border: 1.5px solid var(--border);
      border-bottom: none;
    }
    .toolbar button,
    .toolbar select,
    .toolbar input[type="color"] {
      border: none;
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      padding: 7px 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      min-width: 38px;
      min-height: 38px;
      transition: background .18s, color .18s, box-shadow .18s;
      outline: none;
    }
    .toolbar button:hover,
    .toolbar select:focus,
    .toolbar input[type="color"]:focus {
      background: var(--primary-light);
      color: var(--primary-dark);
    }
    .toolbar button i {
      color: var(--icon);
      font-size: 18px;
      transition: color .18s;
    }
    .toolbar button:hover i {
      color: var(--primary-dark);
    }
    .toolbar select {
      border: 1px solid var(--border);
      background: #fff;
      padding-right: 18px;
      min-width: 100px;
    }
    .toolbar input[type="color"] {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      box-shadow: none;
      padding: 0;
    }
    .toolbar input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .toolbar input[type="color"]::-webkit-color-swatch {
      border-radius: 50%;
      border: none;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      left: 0;
      top: 110%;
      min-width: 180px;
      background: var(--toolbar-bg);
      box-shadow: var(--toolbar-shadow);
      border-radius: 10px;
      z-index: 9999;
      border: 1.5px solid var(--border);
      animation: dropdownFade .18s;
      overflow: visible;
    }
    @keyframes dropdownFade {
      from { opacity: 0; transform: translateY(-8px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .dropdown-content button {
      width: 100%;
      background: none;
      border: none;
      padding: 12px 16px;
      text-align: left;
      border-radius: 0;
      font-size: 15px;
      color: var(--text);
      transition: background .15s, color .15s;
      cursor: pointer;
      outline: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dropdown-content button:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
    }
    .dropdown:hover .dropdown-content,
    .dropdown:focus-within .dropdown-content {
      display: block;
    }
    .editor-outer {
      background: var(--editor-bg);
      padding: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1.5px solid var(--border);
      border-top: none;
      box-shadow: var(--editor-shadow);
      position: relative;
      z-index: 1;
    }
    .editor {
      width: 100%;
      min-height: 320px;
      max-height: 60vh;
      border: none;
      outline: none;
      resize: vertical;
      padding: 32px 30px 28px 30px;
      border-radius: 0 0 var(--radius) var(--radius);
      font-size: 1.19rem;
      line-height: 1.8;
      background: transparent;
      color: var(--text);
      box-sizing: border-box;
      overflow-y: auto;
      transition: box-shadow .19s, background .17s;
      word-break: break-word;
      box-shadow: none;
    }
    .editor:focus {
      background: var(--editor-bg);
      box-shadow: 0 0 0 2.5px var(--primary-light) inset;
    }
    .editor[contenteditable="true"]:empty:before {
      content: attr(data-placeholder);
      color: var(--text-light);
      opacity: 0.7;
      pointer-events: none;
      font-style: italic;
      font-size: 1.08rem;
      position: absolute;
      left: 38px;
      top: 32px;
      z-index: 0;
      letter-spacing: 0.01em;
    }
    .wordcount {
      text-align: right;
      margin: 8px 8px 8px 0;
      font-size: 14px;
      color: var(--text-light);
      user-select: none;
      padding-right: 4px;
    }
    .actions-bottom {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }
    /* Responsive */
    @media (max-width: 600px) {
      .container { max-width: 100vw; }
      .toolbar { padding: 6px 1vw 6px 2vw; gap: 3px; font-size: 14px;}
      .editor-outer { border-radius: 0 0 14px 14px; }
      .editor { padding: 16px 3vw 14px 3vw; font-size: 1rem; }
      .dropdown-content {
        min-width: 85vw;
        left: 50%;
        transform: translateX(-50%);
      }
    }
    @media (max-width: 400px) {
      .editor { padding: 9px 2vw 8px 2vw; font-size: .99rem;}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown/dist/turndown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body data-theme="light">
  <div class="container">
    <div class="toolbar" id="toolbar">
      <button onclick="format('bold')" title="Đậm"><i class="fas fa-bold"></i></button>
      <button onclick="format('italic')" title="Nghiêng"><i class="fas fa-italic"></i></button>
      <button onclick="format('underline')" title="Gạch chân"><i class="fas fa-underline"></i></button>
      <button onclick="format('insertUnorderedList')" title="Danh sách"><i class="fas fa-list-ul"></i></button>
      <button onclick="format('justifyLeft')" title="Căn trái"><i class="fas fa-align-left"></i></button>
      <button onclick="format('justifyCenter')" title="Căn giữa"><i class="fas fa-align-center"></i></button>
      <button onclick="format('justifyRight')" title="Căn phải"><i class="fas fa-align-right"></i></button>
      <select onchange="format('fontName', this.value)" title="Phông chữ">
        <option value="">Phông chữ</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier</option>
        <option value="Times New Roman">Times</option>
        <option value="Comic Sans MS">Comic Sans</option>
      </select>
      <select onchange="format('fontSize', this.value)" title="Cỡ chữ">
        <option value="">Cỡ chữ</option>
        <option value="1">Rất nhỏ</option>
        <option value="3">Bình thường</option>
        <option value="5">Lớn</option>
        <option value="7">Rất lớn</option>
      </select>
      <input type="color" onchange="format('foreColor', this.value)" title="Màu chữ">
      <input type="color" onchange="format('hiliteColor', this.value)" title="Màu nền chữ">
      <button onclick="insertLink()" title="Thêm liên kết"><i class="fas fa-link"></i></button>
      <button onclick="insertImage()" title="Thêm ảnh"><i class="fas fa-image"></i></button>
      <button onclick="insertVideo()" title="Chèn video YouTube"><i class="fas fa-video"></i></button>
      <button onclick="format('undo')" title="Hoàn tác"><i class="fas fa-undo"></i></button>
      <button onclick="format('redo')" title="Làm lại"><i class="fas fa-redo"></i></button>
      <div class="dropdown">
        <button title="Nhập tập tin"><i class="fas fa-file-import"></i></button>
        <div class="dropdown-content">
          <input type="file" id="fileInput" accept=".txt, .html, .md" style="display: none;" onchange="importFile(event)">
          <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-file-upload"></i> Chọn file</button>
        </div>
      </div>
      <div class="dropdown">
        <button title="Xuất tập tin"><i class="fas fa-file-export"></i></button>
        <div class="dropdown-content">
          <button onclick="exportFile('txt')"><i class="fas fa-file-alt"></i> Xuất TXT</button>
          <button onclick="exportFile('html')"><i class="fas fa-code"></i> Xuất HTML</button>
          <button onclick="exportFile('md')"><i class="fas fa-file-markdown"></i> Xuất Markdown</button>
          <button onclick="exportFile('pdf')"><i class="fas fa-file-pdf"></i> Xuất PDF</button>
        </div>
      </div>
      <button onclick="toggleTheme()" title="Đổi giao diện"><i class="fas fa-moon"></i>/<i class="fas fa-sun"></i></button>
      <button onclick="clearEditor()" title="Xóa tất cả"><i class="fas fa-trash"></i></button>
    </div>
    <div class="editor-outer">
      <div id="editor" class="editor" contenteditable="true" spellcheck="true" aria-label="Khu vực soạn thảo" data-placeholder="✍️ Bắt đầu gõ văn bản..."></div>
    </div>
    <div class="wordcount" id="wordcount">0 từ, 0 ký tự</div>
  </div>
  <script>
    const editor = document.getElementById('editor');
    const { jsPDF } = window.jspdf;
    const showdownConverter = new showdown.Converter();
    const turndownService = new TurndownService();

    function format(cmd, val = null) {
      editor.focus();
      document.execCommand(cmd, false, val);
      updateWordCount();
      saveToLocal();
    }
    function insertLink() {
      const url = prompt("Nhập URL liên kết:");
      if (url) format('createLink', url);
    }
    function insertImage() {
      const url = prompt("Dán link ảnh vào đây:");
      if (url) format('insertImage', url);
    }
    function insertVideo() {
      const url = prompt("Dán link YouTube:");
      if (url) {
        let embedUrl = url;
        if (/youtube\.com\/watch\?v=/.test(url)) {
          embedUrl = url.replace("watch?v=", "embed/");
        } else if (/youtu\.be\//.test(url)) {
          embedUrl = "https://www.youtube.com/embed/" + url.split('/').pop();
        }
        const iframe = `<br><iframe width='100%' height='315' src='${embedUrl}' frameborder='0' allowfullscreen style="max-width:100%;"></iframe><br>`;
        document.execCommand('insertHTML', false, iframe);
        updateWordCount();
        saveToLocal();
      }
    }
    function importFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        let content = e.target.result;
        if (file.name.endsWith('.md')) {
          content = showdownConverter.makeHtml(content);
        }
        editor.innerHTML = content;
        updateWordCount();
        saveToLocal();
      };
      reader.readAsText(file);
    }
    function exportFile(type) {
      let filename = 'vanban_text2';
      let content, mimeType;
      switch (type) {
        case 'txt':
          content = editor.innerText;
          mimeType = 'text/plain';
          filename += '.txt';
          break;
        case 'html':
          content = editor.innerHTML;
          mimeType = 'text/html';
          filename += '.html';
          break;
        case 'md':
          content = turndownService.turndown(editor.innerHTML);
          mimeType = 'text/markdown';
          filename += '.md';
          break;
        case 'pdf':
          exportPDF();
          return;
        default: return;
      }
      const blob = new Blob([content], { type: mimeType });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 500);
    }
    function exportPDF() {
      const doc = new jsPDF({ unit: "mm", format: "a4" });
      let content = editor.innerText;
      let lines = doc.splitTextToSize(content, 180);
      doc.text(lines, 15, 20);
      doc.save('vanban_text2.pdf');
    }
    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute("data-theme");
      body.setAttribute("data-theme", current === "light" ? "dark" : "light");
      saveToLocal();
    }
    function updateWordCount() {
      const text = editor.innerText.replace(/\u200B/g, '').trim();
      const words = text.split(/\s+/).filter(Boolean);
      document.getElementById('wordcount').innerText = `${words.length} từ, ${text.length} ký tự`;
    }
    function saveToLocal() {
      localStorage.setItem('text2_autosave', editor.innerHTML);
      localStorage.setItem('text2_theme', document.body.getAttribute('data-theme'));
    }
    function restoreFromLocal() {
      const saved = localStorage.getItem('text2_autosave');
      if (saved) editor.innerHTML = saved;
      const theme = localStorage.getItem('text2_theme');
      if (theme) document.body.setAttribute('data-theme', theme);
    }
    function clearEditor() {
      if (confirm("Bạn có chắc chắn muốn xóa toàn bộ nội dung?")) {
        editor.innerHTML = "";
        updateWordCount();
        saveToLocal();
      }
    }
    editor.addEventListener('input', () => {
      updateWordCount();
      saveToLocal();
    });
    restoreFromLocal();
    updateWordCount();

    // Phím tắt: Ctrl+S để lưu, Ctrl+B/I/U cho đậm/nghiêng/gạch chân
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key.toLowerCase() === 's') {
        e.preventDefault();
        saveToLocal();
        alert('Đã lưu bản nháp!');
      }
      if (e.ctrlKey && e.key.toLowerCase() === 'b') { e.preventDefault(); format('bold'); }
      if (e.ctrlKey && e.key.toLowerCase() === 'i') { e.preventDefault(); format('italic'); }
      if (e.ctrlKey && e.key.toLowerCase() === 'u') { e.preventDefault(); format('underline'); }
    });
  </script>
</body>
</html>
